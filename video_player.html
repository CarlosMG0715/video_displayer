<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video_player</title>
</head>

<body>
    <h1>Video and image displayer</h1>
    <section id="First-video">
        <h2>Video 1: What is the map method?</h2>
        <p>Author: Freecodecamp </p>
        <video width="600" controls>
            <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
                type="video/mp4">
        </video>
    </section>
    <section id="First-Song">
        <h2>Song 1: Sailing Away</h2>
        <p>Author: Freecodecamp</p>
        <audio loop controls src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"></audio>
    </section>
</body>

</html>
